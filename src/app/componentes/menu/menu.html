  <div class="wrap">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#a89be0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <div>
        <div class="logo-title">Facturación</div>
        <div class="logo-sub">Sistema de gestión</div>
      </div>
    </div>

    <div class="nav">
      <button class="nav-item" [routerLink]='"factura"' >
        <div class="icon-box i1">
          <svg viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <span class="item-label">Factura</span>
        <span class="item-sub">Ver / buscar</span>
      </button>

      <div class="sep"></div>

      <button class="nav-item" (click)="this.irA('lista')">
        <div class="icon-box i2">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0284c7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </div>
        <span class="item-label">Lista de facturas</span>
        <span class="item-sub">Historial</span>
      </button>

      <div class="sep"></div>

      <button class="nav-item"  [routerLink]='"administrar"' >
        <div class="icon-box i3">
          <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <span class="item-label">Nueva factura</span>
        <span class="item-sub">Emitir comprobante</span>
      </button>

      <div class="sep"></div>

      <button class="nav-item danger" (click)="this.irA('salir')">
        <div class="icon-box i4">
          <svg viewBox="0 0 24 24" fill="none" stroke="#a32d2d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>
        <span class="item-label">Salir</span>
        <span class="item-sub">Cerrar sesión</span>
      </button>
    </div>
  </div>
