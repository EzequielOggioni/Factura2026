@for (factura of facturas | async; track $index) {
    <app-item-lista [variabledeentradadelelementohijo]="factura" ></app-item-lista>
}@empty {
    <h2>No hay facturas disponibles.</h2>
}

<a routerLink="/factura">Crear Factura</a>
<input type="button" value="Ver facturas" (click)="ver()">

@for (users of usuarios | async; track $index) {
    <div class="factura">
        <p>Título: {{ users.title }}</p>
    </div>

}@empty {
    <h2>No hay facturas disponibles.</h2>
}
